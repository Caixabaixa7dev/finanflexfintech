<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - FinanFlex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo"><img src="../assets/logo.png" alt="FinanFlex" height="64" style="margin:0 auto"></div>
      <div class="login-subtitle">Painel Administrativo</div>
      <div class="login-error" id="loginError">Credenciais inválidas</div>
      <div class="form-group">
        <label for="loginEmail">E-mail</label>
        <input type="email" id="loginEmail" class="form-control" placeholder="admin@finanflex.com.br" value="admin@finanflex.com.br">
      </div>
      <div class="form-group">
        <label for="loginSenha">Senha</label>
        <input type="password" id="loginSenha" class="form-control" placeholder="Sua senha">
      </div>
      <button class="btn btn-primary" id="loginBtn">Entrar</button>
    </div>
  </div>
  <script src="../js/api.js"></script>
  <script>
    document.getElementById('loginBtn').addEventListener('click', async function() {
      const email = document.getElementById('loginEmail').value;
      const senha = document.getElementById('loginSenha').value;
      const errorEl = document.getElementById('loginError');

      if (!email || !senha) {
        errorEl.textContent = 'Preencha email e senha';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const data = await api.post('/api/auth/login', { email, senha });
        localStorage.setItem('finanflex_token', data.token);
        localStorage.setItem('finanflex_admin', JSON.stringify(data.admin));
        window.location.href = 'dashboard.html';
      } catch (err) {
        errorEl.textContent = err.message || 'Erro ao fazer login';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('loginSenha').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
  </script>
</body>
</html>
